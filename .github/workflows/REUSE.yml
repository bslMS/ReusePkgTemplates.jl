name: REUSE
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: fsfe/reuse-action@v6
