# REUSE.toml
# Part of ReusePkgTemplates

version = 1

[[annotations]]
path = [
    ".gitattributes",
    ".gitignore",
    ".github/**",
    ".vscode/**",
    ".licensing/**",
    ".*.yml",
    ".drone.star",
    ".JuliaFormatter.toml",
    ".codecov.yml",
    "CITATION.bib",
    "CODEOWNERS",
    "Project.toml",
    "Manifest.toml",
    "docs/make.jl",
    "docs/Project.toml",
    "docs/Manifest.toml",
    "test/Project.toml",
    "test/Manifest.toml",
    "scripts/Project.toml",
    "scripts/Manifest.toml",
    "templates/*.mustache"
]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Guido Wolf Reichert and contributors"
SPDX-License-Identifier = "0BSD"
SPDX-FileComment = "This file is generated, project metadata, or other project infrastructure."

[[annotations]]
path = ["docs/src/assets/**"]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Guido Wolf Reichert and contributors"
SPDX-License-Identifier = "CC-BY-SA-4.0"
SPDX-FileComment = "This file is content for the documentation."

[[annotations]]
path = ["README.md", "docs/*.md", "docs/src/**/*.md"]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Guido Wolf Reichert and contributors"
SPDX-License-Identifier = "CC-BY-SA-4.0"
SPDX-FileComment = "This file is a documentation source file."
