    />
    <path
        class="arrow orange"
        d="M 103.5 437.5 H 62.375 C 39.662 437.5 21.25 419.088 21.25 396.375 V 365 H 9.5 L 33 341.5 L 56.5 365 H 44.75 V 396.375 C 44.75 406.109 52.641 414 62.375 414 H 103.5 Z"
    />

    <path class="guide" d="M 76 183.68 H 124.5" />
    <path class="guide" d="M 76 365.5 H 124.5" />
    <path class="guide" d="M 322.32 365.5 H 370.82" />
    <path class="guide" d="M 422.5 265.32 H 471" />
    <path class="guide" d="M 422.5 83.5 H 471" />
