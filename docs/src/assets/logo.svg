<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 550 472"
    role="img"
    aria-labelledby="title desc"
>
    <title id="title">ReusePkgTemplates.jl logo</title>
    <desc id="desc">
        A blueprint-style package box surrounded by four clear reuse arrows in Julia-inspired colors.
    </desc>

    <defs>
        <style>
            .guide {
                fill: none;
                stroke: #f0f0f0;
                stroke-width: 2;
                stroke-linecap: square;
                stroke-linejoin: miter;
            }

            .box {
                fill: none;
                stroke: #666666;
                stroke-width: 7.25;
                stroke-linecap: square;
                stroke-linejoin: miter;
            }

            .arrow {
                stroke-width: 6.875;
                stroke-linecap: square;
                stroke-linejoin: miter;
                stroke-miterlimit: 8;
            }

            .green {
                fill: #4ea72e;
                stroke: #4ea72e;
            }

            .purple {
                fill: #a02b93;
                stroke: #a02b93;
            }

            .blue {
                fill: #00b0f0;
                stroke: #00b0f0;
            }

            .orange {
                fill: #e97132;
                stroke: #e97132;
            }
        </style>
    </defs>

    <path
        class="arrow green"
        d="M 108.5 104.5 V 63.375 C 108.5 40.662 126.912 22.25 149.625 22.25 H 182 V 10.5 L 205.5 34 L 182 57.5 V 45.75 H 149.625 C 139.891 45.75 132 53.641 132 63.375 V 104.5 Z"
    />
    <path
        class="arrow purple"
        d="M 443.5 37.5 H 484.625 C 507.338 37.5 525.75 55.912 525.75 78.625 V 111 H 537.5 L 514 134.5 L 490.5 111 H 502.25 V 78.625 C 502.25 68.891 494.359 61 484.625 61 H 443.5 Z"
    />
    <path
        class="arrow blue"
